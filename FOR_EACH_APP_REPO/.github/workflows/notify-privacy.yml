name: Notify Privacy Site

on:
  push:
    branches:
      - main
    paths:
      - 'description.txt'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger privacy site rebuild
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.PRIVACY_SYNC_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/mehedibuet11/mehedibuet11.github.io/dispatches \
            -d '{"event_type": "privacy-updated", "client_payload": {"repo": "${{ github.repository }}"}}'
